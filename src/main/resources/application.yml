spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
     console:
       enable: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernete:
      ddl-auto: validate
    show-sql: true
  flyway:
    enable: true